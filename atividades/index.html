<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades — P.I.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:    #0F1923;
            --ink2:   #3D4F5C;
            --ink3:   #8A9BAA;
            --paper:  #F6F4EF;
            --white:  #FFFFFF;
            --line:   #DDD9D0;
            --blue:   #2A5BDB;
            --verde:  #0B6E4F;
            --coral:  #C0410D;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            margin: 0;
            padding: 60px 20px 80px;
        }

        .container { max-width: 860px; margin: 0 auto; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            color: var(--ink3);
            text-decoration: none;
            margin-bottom: 28px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--blue); }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.8rem;
            margin: 0 0 10px;
        }

        .subtitle { color: var(--ink2); font-size: 1.1rem; margin: 0 0 40px; }

        .filtros {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .filtro-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--line);
            background: var(--white);
            color: var(--ink2);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filtro-btn:hover { border-color: var(--blue); color: var(--blue); }
        .filtro-btn.ativo { background: var(--blue); border-color: var(--blue); color: var(--white); }

        .lista { display: flex; flex-direction: column; gap: 16px; }

        .atividade-card {
            background: var(--white);
            border: 1.5px solid var(--line);
            border-radius: 12px;
            padding: 24px 28px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: start;
            transition: box-shadow 0.2s;
        }
        .atividade-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
        .atividade-card.encerrada { opacity: 0.6; }

        .card-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .tag-turma     { background: #E8EFFE; color: var(--blue); }
        .tag-aberta    { background: #D1F0E4; color: var(--verde); }
        .tag-encerrada { background: #FFE8DF; color: var(--coral); }

        .card-titulo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            margin: 0 0 8px;
        }

        .card-desc { font-size: 0.95rem; color: var(--ink2); line-height: 1.55; margin: 0 0 12px; }

        .card-prazo { font-size: 0.82rem; color: var(--ink3); }

        .btn-form {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--blue);
            color: var(--white);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-form:hover { background: #1e4bc4; transform: translateY(-1px); }
        .btn-form.encerrado {
            background: var(--line);
            color: var(--ink3);
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Estados */
        .estado {
            text-align: center;
            padding: 60px 20px;
            color: var(--ink3);
        }
        .estado .icone { font-size: 3rem; margin-bottom: 16px; }
        .estado h2 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--ink2); margin: 0 0 8px; }
        .estado p  { font-size: 0.95rem; margin: 0; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--line);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            margin-top: 60px;
            font-size: 0.82rem;
            color: var(--ink3);
            border-top: 1px solid var(--line);
            padding-top: 20px;
        }

        @media (max-width: 560px) {
            .atividade-card { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <a href="../index.html" class="back-link">← Voltar ao portal</a>
    <h1>Atividades</h1>
    <p class="subtitle">Links dos formulários para entrega das atividades do semestre.</p>

    <div class="filtros" id="filtros">
        <button class="filtro-btn ativo" data-filtro="todas">Todas</button>
        <button class="filtro-btn" data-filtro="aberta">Abertas</button>
        <button class="filtro-btn" data-filtro="encerrada">Encerradas</button>
    </div>

    <div id="lista" class="lista">
        <div class="estado">
            <div class="spinner"></div>
            <p>Carregando atividades…</p>
        </div>
    </div>

    <footer>P.I. — Desenvolvido para apoio acadêmico.</footer>
</div>

<script>
    let todasAtividades = [];
    let filtroAtivo = 'todas';

    function escHtml(s) {
        if (!s) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatarData(val) {
        if (!val) return null;
        // Aceita YYYY-MM-DD ou DD/MM/YYYY
        const iso = /^\d{4}-\d{2}-\d{2}$/.test(val) ? val : null;
        if (iso) {
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`;
        }
        return val; // já está formatado
    }

    function toIso(val) {
        if (!val) return null;
        if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
        // DD/MM/YYYY → YYYY-MM-DD
        const m = val.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (m) return `${m[3]}-${m[2]}-${m[1]}`;
        return null;
    }

    function extrairSheetId(url) {
        const m = (url || '').match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
        return m ? m[1] : null;
    }

    function parseGviz(text) {
        const json = JSON.parse(text.slice(text.indexOf('{'), text.lastIndexOf('}') + 1));
        let cols = json.table.cols.map(c => (c.label || '').trim());
        let rows = json.table.rows || [];
        const temLabels = cols.some(l => l && !/^[A-Z]{1,2}$/.test(l));
        if (!temLabels && rows.length > 0 && rows[0].c) {
            const primeira = rows[0].c.map(cell => cell ? String(cell.v ?? '').trim() : '');
            if (primeira.some(h => h)) { cols = primeira; rows = rows.slice(1); }
        }
        return { cols, rows: rows.filter(r => r.c && r.c[0] && r.c[0].v != null) };
    }

    async function carregarAtividades() {
        try {
            const cfg = await fetch('../data/config.json?_=' + Date.now()).then(r => r.json());
            if (!cfg.sheetsUrl) {
                mostrarEstado('📭', 'Nenhuma atividade configurada', 'O professor ainda não vinculou a planilha de atividades.');
                return;
            }

            const id = extrairSheetId(cfg.sheetsUrl);
            if (!id) {
                mostrarEstado('⚠️', 'URL inválida', 'Fale com o professor para verificar a configuração.');
                return;
            }

            const text = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&headers=1`).then(r => r.text());
            const { cols, rows } = parseGviz(text);
            const colsLower = cols.map(c => c.toLowerCase());

            todasAtividades = rows
                .map((row, i) => {
                    const obj = { id: String(i) };
                    colsLower.forEach((col, ci) => {
                        const cell = row.c[ci];
                        obj[col] = cell ? String(cell.v || cell.f || '').trim() : '';
                    });
                    return obj;
                });

            renderizar();
        } catch (e) {
            mostrarEstado('❌', 'Erro ao carregar', 'Não foi possível buscar as atividades. Tente recarregar a página.');
        }
    }

    function mostrarEstado(icone, titulo, msg) {
        document.getElementById('lista').innerHTML = `
            <div class="estado">
                <div class="icone">${icone}</div>
                <h2>${titulo}</h2>
                <p>${msg}</p>
            </div>`;
    }

    function renderizar() {
        const hoje = new Date().toISOString().split('T')[0];

        let itens = todasAtividades;

        if (filtroAtivo === 'aberta') {
            itens = itens.filter(a => {
                const prazoIso = toIso(a.prazo);
                return a.status === 'aberta' || (a.status !== 'encerrada' && (!prazoIso || prazoIso >= hoje));
            });
        } else if (filtroAtivo === 'encerrada') {
            itens = itens.filter(a => {
                const prazoIso = toIso(a.prazo);
                return a.status === 'encerrada' || (prazoIso && prazoIso < hoje);
            });
        }

        if (itens.length === 0) {
            mostrarEstado('📭', 'Nenhuma atividade encontrada', 'Nenhuma atividade corresponde ao filtro selecionado.');
            return;
        }

        document.getElementById('lista').innerHTML = itens.map(a => {
            const prazoIso = toIso(a.prazo);
            const encerrada = a.status === 'encerrada' || (prazoIso && prazoIso < hoje);
            const tagCls = encerrada ? 'tag-encerrada' : 'tag-aberta';
            const tagTxt = encerrada ? 'Encerrada' : 'Aberta';

            return `
            <div class="atividade-card${encerrada ? ' encerrada' : ''}">
                <div class="card-info">
                    <div class="card-tags">
                        ${a.turma ? `<span class="tag tag-turma">${escHtml(a.turma)}</span>` : ''}
                        <span class="tag ${tagCls}">${tagTxt}</span>
                    </div>
                    <h2 class="card-titulo">${escHtml(a.titulo)}</h2>
                    ${a.descricao ? `<p class="card-desc">${escHtml(a.descricao)}</p>` : ''}
                    ${a.prazo ? `<span class="card-prazo">📅 Prazo: ${escHtml(formatarData(a.prazo))}</span>` : ''}
                </div>
                <div class="card-acao">
                    ${a.link
                        ? `<a href="${escHtml(a.link)}" class="btn-form${encerrada ? ' encerrado' : ''}" target="_blank" rel="noopener">Acessar Formulário ↗</a>`
                        : `<span class="btn-form encerrado">Link indisponível</span>`
                    }
                </div>
            </div>`;
        }).join('');
    }

    document.getElementById('filtros').addEventListener('click', e => {
        const btn = e.target.closest('.filtro-btn');
        if (!btn) return;
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        filtroAtivo = btn.dataset.filtro;
        renderizar();
    });

    carregarAtividades();
</script>
</body>
</html>
