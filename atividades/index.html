<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades — P.I.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:    #0F1923;
            --ink2:   #3D4F5C;
            --ink3:   #8A9BAA;
            --paper:  #F6F4EF;
            --white:  #FFFFFF;
            --line:   #DDD9D0;
            --blue:   #2A5BDB;
            --verde:  #0B6E4F;
            --coral:  #C0410D;
            --ambar:  #9A5000;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            margin: 0;
            padding: 60px 20px 80px;
        }

        .container { max-width: 860px; margin: 0 auto; }

        header { margin-bottom: 48px; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.875rem;
            color: var(--ink3);
            text-decoration: none;
            margin-bottom: 28px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--blue); }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.8rem;
            margin: 0 0 10px;
        }

        .subtitle {
            color: var(--ink2);
            font-size: 1.1rem;
            margin: 0;
        }

        /* Filtros */
        .filtros {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .filtro-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--line);
            background: var(--white);
            color: var(--ink2);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filtro-btn:hover { border-color: var(--blue); color: var(--blue); }
        .filtro-btn.ativo {
            background: var(--blue);
            border-color: var(--blue);
            color: var(--white);
        }

        /* Lista de atividades */
        .lista { display: flex; flex-direction: column; gap: 16px; }

        .atividade-card {
            background: var(--white);
            border: 1.5px solid var(--line);
            border-radius: 12px;
            padding: 24px 28px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: start;
            transition: box-shadow 0.2s;
        }
        .atividade-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

        .atividade-card.encerrada { opacity: 0.6; }

        .card-info { min-width: 0; }

        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .tag-turma  { background: #E8EFFE; color: var(--blue); }
        .tag-aberta { background: #D1F0E4; color: var(--verde); }
        .tag-encerrada { background: #FFE8DF; color: var(--coral); }

        .card-titulo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            margin: 0 0 8px;
            color: var(--ink);
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--ink2);
            line-height: 1.55;
            margin: 0 0 12px;
        }

        .card-prazo {
            font-size: 0.82rem;
            color: var(--ink3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-acao { flex-shrink: 0; }

        .btn-form {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--blue);
            color: var(--white);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-form:hover { background: #1e4bc4; transform: translateY(-1px); }
        .btn-form.encerrado {
            background: var(--line);
            color: var(--ink3);
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Estado vazio */
        .estado-vazio {
            text-align: center;
            padding: 60px 20px;
            color: var(--ink3);
        }
        .estado-vazio .icone { font-size: 3rem; margin-bottom: 16px; }
        .estado-vazio h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            color: var(--ink2);
            margin: 0 0 8px;
        }
        .estado-vazio p { font-size: 0.95rem; margin: 0; }

        footer {
            margin-top: 60px;
            font-size: 0.82rem;
            color: var(--ink3);
            border-top: 1px solid var(--line);
            padding-top: 20px;
        }

        @media (max-width: 560px) {
            .atividade-card { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <a href="../index.html" class="back-link">← Voltar ao portal</a>
        <h1>Atividades</h1>
        <p class="subtitle">Links dos formulários para entrega das atividades do semestre.</p>
    </header>

    <div class="filtros" id="filtros">
        <button class="filtro-btn ativo" data-filtro="todas">Todas</button>
        <button class="filtro-btn" data-filtro="aberta">Abertas</button>
        <button class="filtro-btn" data-filtro="encerrada">Encerradas</button>
    </div>

    <div class="lista" id="lista"></div>

    <footer>P.I. — Desenvolvido para apoio acadêmico.</footer>

</div>

<script>
    let todasAtividades = [];
    let filtroAtivo = 'todas';

    async function carregarAtividades() {
        try {
            const resp = await fetch('../data/atividades.json?_=' + Date.now());
            const dados = await resp.json();
            todasAtividades = dados.atividades || [];
        } catch (e) {
            todasAtividades = [];
        }
        renderizar();
    }

    function formatarData(iso) {
        if (!iso) return null;
        const [y, m, d] = iso.split('-');
        return `${d}/${m}/${y}`;
    }

    function renderizar() {
        const lista = document.getElementById('lista');
        const hoje = new Date().toISOString().split('T')[0];

        let itens = todasAtividades;

        if (filtroAtivo === 'aberta') {
            itens = itens.filter(a => a.status === 'aberta' || (a.status !== 'encerrada' && (!a.prazo || a.prazo >= hoje)));
        } else if (filtroAtivo === 'encerrada') {
            itens = itens.filter(a => a.status === 'encerrada' || (a.prazo && a.prazo < hoje));
        }

        if (itens.length === 0) {
            lista.innerHTML = `
                <div class="estado-vazio">
                    <div class="icone">📭</div>
                    <h2>Nenhuma atividade encontrada</h2>
                    <p>Quando o professor adicionar atividades, elas aparecerão aqui.</p>
                </div>`;
            return;
        }

        lista.innerHTML = itens.map(a => {
            const encerrada = a.status === 'encerrada' || (a.prazo && a.prazo < hoje);
            const labelStatus = encerrada ? 'Encerrada' : 'Aberta';
            const classStatus = encerrada ? 'tag-encerrada' : 'tag-aberta';
            const prazoFormatado = formatarData(a.prazo);

            return `
            <div class="atividade-card${encerrada ? ' encerrada' : ''}">
                <div class="card-info">
                    <div class="card-tags">
                        ${a.turma ? `<span class="tag tag-turma">${escHtml(a.turma)}</span>` : ''}
                        <span class="tag ${classStatus}">${labelStatus}</span>
                    </div>
                    <h2 class="card-titulo">${escHtml(a.titulo)}</h2>
                    ${a.descricao ? `<p class="card-desc">${escHtml(a.descricao)}</p>` : ''}
                    ${prazoFormatado ? `<span class="card-prazo">📅 Prazo: ${prazoFormatado}</span>` : ''}
                </div>
                <div class="card-acao">
                    ${a.link
                        ? `<a href="${escHtml(a.link)}" class="btn-form${encerrada ? ' encerrado' : ''}" target="_blank" rel="noopener">
                                Acessar Formulário ↗
                           </a>`
                        : `<span class="btn-form encerrado">Link indisponível</span>`
                    }
                </div>
            </div>`;
        }).join('');
    }

    function escHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;');
    }

    document.getElementById('filtros').addEventListener('click', e => {
        const btn = e.target.closest('.filtro-btn');
        if (!btn) return;
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        filtroAtivo = btn.dataset.filtro;
        renderizar();
    });

    carregarAtividades();
</script>
</body>
</html>
