<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Vida Empresarial — P.I.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:#0F1923;--ink2:#3D4F5C;--ink3:#8A9BAA;--paper:#F6F4EF;
            --white:#FFF;--line:#DDD9D0;--blue:#2A5BDB;--verde:#0B6E4F;
            --coral:#C0410D;--ambar:#9A5000;--roxo:#5B21A8;--teal:#0A6960;
        }
        *,*::before,*::after{box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--white);margin:0;min-height:100vh;}

        /* ── TELAS ── */
        .tela{display:none;min-height:100vh;}
        .tela.ativa{display:block;}

        /* ── SETUP ── */
        #tela-setup{display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#0F1923 0%,#1a2f42 100%);}
        .setup-card{background:var(--white);color:var(--ink);border-radius:20px;padding:48px 44px;max-width:540px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4);}
        .setup-card h1{font-family:'DM Serif Display',serif;font-size:2.2rem;margin:0 0 4px;text-align:center;}
        .setup-card .sub{color:var(--ink2);text-align:center;margin:0 0 32px;font-size:0.95rem;line-height:1.5;}
        .field{margin-bottom:18px;}
        .field label{display:block;font-size:0.85rem;font-weight:500;color:var(--ink2);margin-bottom:6px;}
        .field input,.field select{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.95rem;background:var(--paper);color:var(--ink);outline:none;}
        .field input:focus,.field select:focus{border-color:var(--blue);}
        .equipes-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
        .equipe-row{display:flex;gap:10px;align-items:center;}
        .equipe-row .cor{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:2px solid var(--line);}
        .equipe-row input{flex:1;}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;}
        .btn-big{width:100%;padding:14px;font-size:1.05rem;}
        .btn-primary{background:var(--blue);color:var(--white);}
        .btn-primary:hover{background:#1e4bc4;}
        .btn-secondary{background:var(--paper);color:var(--ink2);border:1.5px solid var(--line);}
        .btn-secondary:hover{border-color:var(--blue);color:var(--blue);}
        .btn-ghost{background:transparent;color:var(--ink3);padding:8px 16px;font-size:0.85rem;}
        .btn-ghost:hover{color:var(--white);}

        /* ── JOGO ── */
        #tela-jogo{background:var(--paper);color:var(--ink);}
        .jogo-header{background:var(--ink);color:var(--white);padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
        .jogo-header .logo{font-family:'DM Serif Display',serif;font-size:1.1rem;}
        .jogo-header .logo span{color:var(--blue);}
        .rodada-badge{background:rgba(255,255,255,0.1);padding:4px 14px;border-radius:20px;font-size:0.82rem;font-weight:500;}
        .fase-badge{background:var(--blue);padding:4px 14px;border-radius:20px;font-size:0.82rem;font-weight:600;margin-left:auto;}
        .jogo-body{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 52px);}

        /* Sidebar equipes */
        .sidebar{background:var(--white);border-right:1.5px solid var(--line);padding:20px;overflow-y:auto;}
        .sidebar h3{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--ink3);margin:0 0 14px;text-transform:uppercase;letter-spacing:0.05em;font-size:0.75rem;}
        .team-card{border:1.5px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;transition:all .2s;}
        .team-card.destaque{border-color:var(--blue);box-shadow:0 2px 12px rgba(42,91,219,0.15);}
        .team-card .nome{font-weight:600;font-size:0.95rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
        .team-card .nome .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
        .recursos{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
        .recurso{background:var(--paper);border-radius:6px;padding:6px 8px;text-align:center;}
        .recurso .val{font-family:'DM Mono',monospace;font-size:0.85rem;font-weight:700;}
        .recurso .lbl{font-size:0.65rem;color:var(--ink3);text-transform:uppercase;letter-spacing:0.04em;}
        .recurso .delta{font-size:0.72rem;font-weight:600;display:inline-block;margin-left:2px;}
        .delta.pos{color:var(--verde);}
        .delta.neg{color:var(--coral);}

        /* Área central */
        .centro{padding:32px 40px;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:720px;margin:0 auto;width:100%;}

        /* Progresso */
        .progresso{width:100%;margin-bottom:32px;}
        .progresso-bar{height:8px;background:var(--line);border-radius:4px;overflow:hidden;}
        .progresso-bar .fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--verde));border-radius:4px;transition:width .6s ease;}
        .progresso-lbl{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--ink3);margin-top:6px;}

        /* Dado */
        .dado-area{text-align:center;margin-bottom:24px;}
        .dado{width:100px;height:100px;background:var(--white);border:3px solid var(--ink);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:3rem;color:var(--ink);box-shadow:0 6px 20px rgba(0,0,0,0.1);cursor:pointer;transition:transform .15s;user-select:none;}
        .dado:hover{transform:scale(1.05);}
        .dado.rolando{animation:shake .5s ease;}
        @keyframes shake{
            0%,100%{transform:rotate(0)}
            20%{transform:rotate(-15deg) scale(1.1)}
            40%{transform:rotate(10deg) scale(0.95)}
            60%{transform:rotate(-8deg) scale(1.05)}
            80%{transform:rotate(5deg)}
        }
        .dado-instrucao{color:var(--ink3);font-size:0.9rem;margin-top:12px;}
        .mercado-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:0.85rem;font-weight:600;margin-top:10px;}
        .mercado-desfavoravel{background:#FFE8DF;color:var(--coral);}
        .mercado-estavel{background:#FFF4DC;color:var(--ambar);}
        .mercado-favoravel{background:#D1F0E4;color:var(--verde);}

        /* Evento */
        .evento-card{background:var(--white);border:1.5px solid var(--line);border-radius:16px;padding:32px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
        .evento-tipo{display:inline-block;padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;}
        .tipo-planejamento{background:#E8EFFE;color:var(--blue);}
        .tipo-financeiro{background:#D1F0E4;color:var(--verde);}
        .tipo-equipe{background:#F3E8FF;color:var(--roxo);}
        .tipo-mercado{background:#FFE8DF;color:var(--coral);}
        .tipo-crise{background:#FFE8DF;color:var(--coral);}
        .tipo-marco{background:#FFF4DC;color:var(--ambar);}
        .tipo-inovacao{background:#E0F5F3;color:var(--teal);}
        .tipo-etica{background:#F3E8FF;color:var(--roxo);}
        .evento-titulo{font-family:'DM Serif Display',serif;font-size:1.6rem;margin:0 0 8px;}
        .evento-conceito{font-size:0.78rem;color:var(--blue);font-weight:500;margin-bottom:14px;}
        .evento-desc{color:var(--ink2);font-size:0.95rem;line-height:1.6;margin-bottom:24px;}

        .opcoes{display:flex;flex-direction:column;gap:10px;}
        .opcao-btn{text-align:left;padding:14px 18px;border:1.5px solid var(--line);border-radius:10px;background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;transition:all .15s;line-height:1.4;}
        .opcao-btn:hover{border-color:var(--blue);background:#f0f0ff;}
        .opcao-btn.selecionada{border-color:var(--blue);background:var(--blue);color:var(--white);}
        .opcao-btn:disabled{cursor:default;opacity:0.7;}
        .opcao-btn:disabled:hover{border-color:var(--line);background:var(--paper);}
        .opcao-letra{font-weight:700;margin-right:8px;}

        /* Vez do time */
        .vez-banner{text-align:center;margin-bottom:20px;padding:12px;border-radius:10px;font-weight:600;font-size:0.95rem;}

        /* Resultado */
        .resultado-card{background:var(--white);border:1.5px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:12px;width:100%;}
        .resultado-card .nome{font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
        .resultado-card .nome .dot{width:10px;height:10px;border-radius:50%;}
        .resultado-card .escolha{font-size:0.88rem;color:var(--ink2);margin-bottom:8px;font-style:italic;}
        .resultado-card .feedback{font-size:0.85rem;color:var(--ink2);line-height:1.4;margin-bottom:8px;}
        .resultado-efeitos{display:flex;gap:12px;flex-wrap:wrap;font-size:0.82rem;}
        .efeito{padding:3px 10px;border-radius:12px;font-weight:600;font-family:'DM Mono',monospace;}
        .efeito.pos{background:#D1F0E4;color:var(--verde);}
        .efeito.neg{background:#FFE8DF;color:var(--coral);}

        /* ── RELATÓRIO ── */
        #tela-relatorio{background:var(--white);color:var(--ink);padding:48px 24px 80px;}
        .relatorio{max-width:900px;margin:0 auto;}
        .relatorio h1{font-family:'DM Serif Display',serif;font-size:2.4rem;margin:0 0 8px;text-align:center;}
        .relatorio .sub{text-align:center;color:var(--ink2);margin-bottom:40px;font-size:1rem;}
        .rel-section{margin-bottom:36px;}
        .rel-section h2{font-family:'DM Serif Display',serif;font-size:1.4rem;margin:0 0 16px;padding-bottom:8px;border-bottom:2px solid var(--line);}
        .ranking{display:flex;flex-direction:column;gap:16px;margin-bottom:32px;}
        .rank-card{background:var(--paper);border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:20px;}
        .rank-pos{font-family:'DM Serif Display',serif;font-size:2.5rem;color:var(--blue);min-width:50px;text-align:center;}
        .rank-info{flex:1;}
        .rank-info .nome{font-weight:700;font-size:1.1rem;margin-bottom:6px;}
        .rank-recursos{display:flex;gap:16px;flex-wrap:wrap;}
        .rank-recursos .r{font-size:0.85rem;color:var(--ink2);}
        .rank-recursos .r strong{color:var(--ink);}
        .timeline{border-left:3px solid var(--line);padding-left:24px;margin-left:12px;}
        .tl-item{margin-bottom:20px;position:relative;}
        .tl-item::before{content:'';position:absolute;left:-30px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--blue);}
        .tl-item .tl-titulo{font-weight:600;font-size:0.95rem;margin-bottom:4px;}
        .tl-item .tl-escolha{font-size:0.85rem;color:var(--ink2);font-style:italic;}
        .rel-btns{display:flex;gap:12px;justify-content:center;margin-top:40px;flex-wrap:wrap;}

        @media print{
            .rel-btns,.jogo-header,.btn{display:none!important;}
            body{background:#fff;color:#000;}
            #tela-relatorio{padding:20px;}
        }

        @media(max-width:700px){
            .jogo-body{grid-template-columns:1fr;}
            .sidebar{border-right:none;border-bottom:1.5px solid var(--line);display:flex;gap:12px;overflow-x:auto;padding:12px;}
            .sidebar h3{display:none;}
            .team-card{min-width:180px;margin:0;}
            .centro{padding:24px 16px;}
            .setup-card{padding:32px 20px;}
            .evento-titulo{font-size:1.3rem;}
        }
    </style>
</head>
<body>

<!-- ═══════════ SETUP ═══════════ -->
<div id="tela-setup" class="tela ativa">
    <div class="setup-card">
        <h1>🎲 Vida Empresarial</h1>
        <p class="sub">Simulador de desafios empresariais. Cada equipe fundará uma empresa e enfrentará 25 rodadas de decisões estratégicas. Ao final, um relatório será gerado.</p>

        <div class="field">
            <label>Quantas equipes?</label>
            <select id="sel-equipes">
                <option value="2">2 equipes</option>
                <option value="3" selected>3 equipes</option>
                <option value="4">4 equipes</option>
            </select>
        </div>

        <div id="equipes-container" class="equipes-grid"></div>

        <button class="btn btn-primary btn-big" id="btn-iniciar">Iniciar Jogo →</button>
        <div style="text-align:center;margin-top:16px;">
            <a href="../index.html" class="btn btn-ghost">← Voltar ao portal</a>
        </div>
    </div>
</div>

<!-- ═══════════ JOGO ═══════════ -->
<div id="tela-jogo" class="tela">
    <div class="jogo-header">
        <div class="logo">🎲 Vida <span>Empresarial</span></div>
        <div class="rodada-badge" id="rodada-badge">Rodada 1/25</div>
        <div class="fase-badge" id="fase-badge">Fundação</div>
    </div>
    <div class="jogo-body">
        <div class="sidebar" id="sidebar-equipes"></div>
        <div class="centro" id="centro"></div>
    </div>
</div>

<!-- ═══════════ RELATÓRIO ═══════════ -->
<div id="tela-relatorio" class="tela">
    <div class="relatorio" id="relatorio-conteudo"></div>
</div>

        {texto:'Preço premium — posicionamento de luxo e exclusividade.',feedback:'Margem excelente, mas o mercado é menor e mais exigente.',efeitos:{caixa:18000,clientes:-3,reputacao:12,equipe:5}},
        {texto:'Modelo de assinatura — receita recorrente e previsível.',feedback:'Fluxo de caixa estável, mas convencer o cliente do primeiro pagamento é difícil.',efeitos:{caixa:12000,clientes:8,reputacao:5,equipe:0}}

   ═══════════════════════════════════════════ */
let estado = {
    equipes: [],
    rodadaAtual: 0,
    fase: 'roll',       // roll | event | choosing | reveal | fim
    equipeSelecionando: 0,
    escolhas: [],        // [indiceOpcao, ...] por equipe na rodada atual
    mercado: 0,          // resultado do dado
    historico: [],       // [{rodada, titulo, escolhas: [{equipe, opcaoIdx, opcaoTexto, efeitos}]}]
};

/* ═══════════════════════════════════════════
   SETUP
   ═══════════════════════════════════════════ */
const selEquipes = document.getElementById('sel-equipes');
const containerEquipes = document.getElementById('equipes-container');

function renderSetupEquipes() {
    const n = parseInt(selEquipes.value);
    containerEquipes.innerHTML = Array.from({length:n}, (_, i) => `
        <div class="equipe-row">
            <div class="cor" style="background:${CORES_EQUIPE[i]}"></div>
            <input type="text" placeholder="Nome da equipe ${i+1}" id="nome-eq-${i}" value="${NOMES_PADRAO[i]}">
        </div>
    `).join('');
}

selEquipes.addEventListener('change', renderSetupEquipes);
renderSetupEquipes();

document.getElementById('btn-iniciar').addEventListener('click', () => {
    const n = parseInt(selEquipes.value);
    estado.equipes = Array.from({length:n}, (_, i) => ({
        nome: document.getElementById(`nome-eq-${i}`).value.trim() || NOMES_PADRAO[i],
        cor: CORES_EQUIPE[i],
        caixa: 100000,
        reputacao: 50,
        equipe: 50,
        clientes: 10,
    }));
    estado.rodadaAtual = 0;
    estado.historico = [];
    mostrarTela('tela-jogo');
    iniciarRodada();
});

function mostrarTela(id) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
}

/* ═══════════════════════════════════════════
   SIDEBAR EQUIPES
   ═══════════════════════════════════════════ */
function renderSidebar(deltas) {
    const sb = document.getElementById('sidebar-equipes');
    sb.innerHTML = '<h3>Equipes</h3>' + estado.equipes.map((eq, i) => {
        const d = deltas && deltas[i] ? deltas[i] : null;
        const dest = estado.fase === 'choosing' && estado.equipeSelecionando === i ? ' destaque' : '';
        return `
        <div class="team-card${dest}">
            <div class="nome"><div class="dot" style="background:${eq.cor}"></div>${esc(eq.nome)}</div>
            <div class="recursos">
                ${recursoHtml('R$',formatCaixa(eq.caixa),d?.caixa)}
                ${recursoHtml('Rep',eq.reputacao,d?.reputacao)}
                ${recursoHtml('Equipe',eq.equipe,d?.equipe)}
                ${recursoHtml('Clientes',eq.clientes,d?.clientes)}
            </div>
        </div>`;
    }).join('');
}

function recursoHtml(label, val, delta) {
    let deltaHtml = '';
    if (delta && delta !== 0) {
        const cls = delta > 0 ? 'pos' : 'neg';
        const sign = delta > 0 ? '+' : '';
        const dVal = label === 'R$' ? sign + formatCaixa(delta) : sign + delta;
        deltaHtml = `<span class="delta ${cls}">${dVal}</span>`;
    }
    return `<div class="recurso"><div class="val">${val}${deltaHtml}</div><div class="lbl">${label}</div></div>`;
}

function formatCaixa(v) {
    if (Math.abs(v) >= 1000) return (v/1000).toFixed(0) + 'k';
    return String(v);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ═══════════════════════════════════════════
   FLUXO DO JOGO
   ═══════════════════════════════════════════ */
function iniciarRodada() {
    if (estado.rodadaAtual >= EVENTOS.length) {
        mostrarRelatorio();
        return;
    }
    estado.fase = 'roll';
    estado.escolhas = [];
    estado.equipeSelecionando = 0;
    const ev = EVENTOS[estado.rodadaAtual];
    document.getElementById('rodada-badge').textContent = `Rodada ${estado.rodadaAtual + 1}/${EVENTOS.length}`;
    document.getElementById('fase-badge').textContent = ev.fase;
    renderSidebar();
    renderDado();
}

function renderDado() {
    const centro = document.getElementById('centro');
    const progresso = renderProgresso();
    centro.innerHTML = `
        ${progresso}
        <div class="dado-area">
            <div class="dado" id="dado" onclick="rolarDado()">?</div>
            <p class="dado-instrucao">Clique no dado para rolar!</p>
        </div>`;
}

function rolarDado() {
    const dado = document.getElementById('dado');
    if (dado.classList.contains('rolando')) return;
    dado.classList.add('rolando');
    const resultado = Math.floor(Math.random() * 6) + 1;
    estado.mercado = resultado;

    let ticks = 0;
    const interval = setInterval(() => {
        dado.textContent = Math.floor(Math.random() * 6) + 1;
        ticks++;
        if (ticks > 10) {
            clearInterval(interval);
            dado.textContent = resultado;
            dado.classList.remove('rolando');
            setTimeout(mostrarEvento, 600);
        }
    }, 80);
}

function mercadoInfo(val) {
    if (val <= 2) return {texto:'Mercado Desfavorável', classe:'mercado-desfavoravel', mod:-3000};
    if (val <= 4) return {texto:'Mercado Estável', classe:'mercado-estavel', mod:0};
    return {texto:'Mercado Favorável', classe:'mercado-favoravel', mod:3000};
}

function mostrarEvento() {
    estado.fase = 'event';
    const ev = EVENTOS[estado.rodadaAtual];
    const m = mercadoInfo(estado.mercado);
    const progresso = renderProgresso();

    const centro = document.getElementById('centro');
    centro.innerHTML = `
        ${progresso}
        <div style="text-align:center;margin-bottom:20px;">
            <span class="mercado-badge ${m.classe}">🎲 ${estado.mercado} — ${m.texto}</span>
        </div>
        <div class="evento-card">
            <span class="evento-tipo tipo-${ev.tipo}">${tipoLabel(ev.tipo)}</span>
            <h2 class="evento-titulo">${esc(ev.titulo)}</h2>
            <p class="evento-conceito">📚 ${esc(ev.conceito)}</p>
            <p class="evento-desc">${esc(ev.descricao)}</p>
        </div>
        <div style="margin-top:20px;width:100%;">
            <button class="btn btn-primary btn-big" onclick="iniciarEscolhas()">Hora de Decidir →</button>
        </div>`;
}

function tipoLabel(t) {
    const m = {planejamento:'Planejamento',financeiro:'Financeiro',equipe:'RH & Equipe',mercado:'Mercado',crise:'Crise',marco:'Marco',inovacao:'Inovação',etica:'Ética'};
    return m[t]||t;
}

function iniciarEscolhas() {
    estado.fase = 'choosing';
    estado.equipeSelecionando = 0;
    estado.escolhas = new Array(estado.equipes.length).fill(-1);
    renderEscolha();
}

function renderEscolha() {
    const eq = estado.equipes[estado.equipeSelecionando];
    const ev = EVENTOS[estado.rodadaAtual];
    const progresso = renderProgresso();
    const centro = document.getElementById('centro');

    centro.innerHTML = `
        ${progresso}
        <div class="vez-banner" style="background:${eq.cor}15;color:${eq.cor};border:2px solid ${eq.cor};">
            🎯 Vez de: ${esc(eq.nome)}
            <br><small style="font-weight:400;opacity:.7;">As outras equipes não devem olhar!</small>
        </div>
        <div class="evento-card">
            <span class="evento-tipo tipo-${ev.tipo}">${tipoLabel(ev.tipo)}</span>
            <h2 class="evento-titulo">${esc(ev.titulo)}</h2>
            <p class="evento-desc">${esc(ev.descricao)}</p>
            <div class="opcoes">
                ${ev.opcoes.map((op, idx) => `
                    <button class="opcao-btn" onclick="selecionarOpcao(${idx})">
                        <span class="opcao-letra">${'ABC'[idx]})</span>${esc(op.texto)}
                    </button>
                `).join('')}
            </div>
        </div>`;

    renderSidebar();
}

function selecionarOpcao(idx) {
    estado.escolhas[estado.equipeSelecionando] = idx;
    estado.equipeSelecionando++;

    if (estado.equipeSelecionando >= estado.equipes.length) {
        mostrarResultados();
    } else {
        renderEscolha();
    }
}

function mostrarResultados() {
    estado.fase = 'reveal';
    const ev = EVENTOS[estado.rodadaAtual];
    const m = mercadoInfo(estado.mercado);
    const progresso = renderProgresso();

    const deltas = [];
    const historicoRodada = {rodada: estado.rodadaAtual, titulo: ev.titulo, conceito: ev.conceito, escolhas: []};

    let html = `${progresso}<h2 style="font-family:'DM Serif Display',serif;text-align:center;margin-bottom:24px;">Resultados da Rodada</h2>`;

    estado.equipes.forEach((eq, i) => {
        const opcIdx = estado.escolhas[i];
        const opc = ev.opcoes[opcIdx];
        const ef = {...opc.efeitos};
        ef.caixa = (ef.caixa || 0) + m.mod;

        eq.caixa += ef.caixa;
        eq.reputacao = clamp(eq.reputacao + (ef.reputacao||0), 0, 100);
        eq.equipe = clamp(eq.equipe + (ef.equipe||0), 0, 100);
        eq.clientes = Math.max(0, eq.clientes + (ef.clientes||0));

        deltas.push(ef);
        historicoRodada.escolhas.push({
            equipe: eq.nome,
            opcaoIdx: opcIdx,
            opcaoTexto: opc.texto,
            feedback: opc.feedback,
            efeitos: ef,
        });

        html += `
        <div class="resultado-card">
            <div class="nome"><div class="dot" style="background:${eq.cor}"></div>${esc(eq.nome)}</div>
            <div class="escolha">"${'ABC'[opcIdx]}) ${esc(opc.texto)}"</div>
            <div class="feedback">${esc(opc.feedback)}</div>
            <div class="resultado-efeitos">
                ${efeitoTag('Caixa',ef.caixa,true)}
                ${efeitoTag('Rep',ef.reputacao)}
                ${efeitoTag('Equipe',ef.equipe)}
                ${efeitoTag('Clientes',ef.clientes)}
            </div>
        </div>`;
    });

    estado.historico.push(historicoRodada);

    html += `<div style="margin-top:24px;text-align:center;">
        <button class="btn btn-primary btn-big" onclick="proximaRodada()">
            ${estado.rodadaAtual < EVENTOS.length - 1 ? 'Próxima Rodada →' : 'Ver Relatório Final →'}
        </button>
    </div>`;

    document.getElementById('centro').innerHTML = html;
    renderSidebar(deltas);
}

function efeitoTag(label, val, isCaixa) {
    if (!val) return '';
    const cls = val > 0 ? 'pos' : 'neg';
    const sign = val > 0 ? '+' : '';
    const display = isCaixa ? sign + 'R$' + Math.abs(val/1000).toFixed(0) + 'k' : sign + val;
    return `<span class="efeito ${cls}">${label}: ${display}</span>`;
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function proximaRodada() {
    estado.rodadaAtual++;
    iniciarRodada();
}

function renderProgresso() {
    const pct = ((estado.rodadaAtual) / EVENTOS.length * 100).toFixed(0);
    const faseAtual = estado.rodadaAtual < EVENTOS.length ? EVENTOS[estado.rodadaAtual].fase : 'Fim';
    return `
    <div class="progresso">
        <div class="progresso-bar"><div class="fill" style="width:${pct}%"></div></div>
        <div class="progresso-lbl"><span>${faseAtual}</span><span>${estado.rodadaAtual}/${EVENTOS.length}</span></div>
    </div>`;
}

/* ═══════════════════════════════════════════
   RELATÓRIO
   ═══════════════════════════════════════════ */
function mostrarRelatorio() {
    mostrarTela('tela-relatorio');
    const rel = document.getElementById('relatorio-conteudo');

    // Ranking por pontuação ponderada
    const ranking = estado.equipes.map((eq, i) => ({
        ...eq, idx: i,
        score: Math.round(eq.caixa/500 + eq.reputacao*12 + eq.equipe*10 + eq.clientes*18)
    })).sort((a, b) => b.score - a.score);

    let html = `
    <h1>📊 Relatório Final</h1>
    <p class="sub">Jogo da Vida Empresarial — ${new Date().toLocaleDateString('pt-BR')}</p>

    <div class="rel-section">
        <h2>🏆 Ranking Final</h2>
        <div class="ranking">
            ${ranking.map((eq, pos) => `
            <div class="rank-card" style="border-left:4px solid ${eq.cor};">
                <div class="rank-pos">${pos+1}º</div>
                <div class="rank-info">
                    <div class="nome" style="color:${eq.cor}">${esc(eq.nome)}</div>
                    <div class="rank-recursos">
                        <span class="r"><strong>R$ ${eq.caixa.toLocaleString('pt-BR')}</strong> Caixa</span>
                        <span class="r"><strong>${eq.reputacao}</strong> Reputação</span>
                        <span class="r"><strong>${eq.equipe}</strong> Equipe</span>
                        <span class="r"><strong>${eq.clientes}</strong> Clientes</span>
                    </div>
                </div>
            </div>`).join('')}
        </div>
    </div>

    <div class="rel-section">
        <h2>📈 Análise Estratégica</h2>
        ${ranking.map(eq => analisarEquipe(eq)).join('')}
    </div>

    <div class="rel-section">
        <h2>📋 Linha do Tempo — Decisões</h2>
        <div class="timeline">
            ${estado.historico.map((h, i) => `
            <div class="tl-item">
                <div class="tl-titulo">Rodada ${i+1}: ${esc(h.titulo)} <small style="color:var(--ink3)">(${esc(h.conceito)})</small></div>
                ${h.escolhas.map(c => `
                    <div class="tl-escolha" style="margin-top:2px;">
                        <strong>${esc(c.equipe)}:</strong> ${esc(c.opcaoTexto)}
                    </div>
                `).join('')}
            </div>`).join('')}
        </div>
    </div>

    <div class="rel-section">
        <h2>💡 Conceitos Aplicados</h2>
        <p style="color:var(--ink2);line-height:1.6;">
            Durante o jogo, as equipes enfrentaram decisões que envolvem os seguintes conceitos:
            <strong>Business Model Canvas</strong> (Proposta de Valor, Segmentos de Clientes, Canais, Relacionamento, Fontes de Receita, Recursos Principais, Atividades-Chave, Parcerias, Estrutura de Custos),
            <strong>Análise SWOT</strong> (Forças, Fraquezas, Oportunidades, Ameaças) e
            <strong>Planejamento Estratégico</strong> (revisões periódicas, pivotagem, visão de longo prazo).
        </p>
    </div>

    <div class="rel-btns">
        <button class="btn btn-primary" onclick="window.print()">🖨 Imprimir Relatório</button>
        <button class="btn btn-secondary" onclick="reiniciar()">🔄 Jogar Novamente</button>
        <a href="../index.html" class="btn btn-secondary">← Voltar ao Portal</a>
    </div>`;

    rel.innerHTML = html;
}

function analisarEquipe(eq) {
    const perfil = [];
    if (eq.caixa > 120000) perfil.push('financeiramente conservadora');
    else if (eq.caixa < 30000) perfil.push('investidora agressiva');
    if (eq.reputacao >= 75) perfil.push('forte em reputação');
    else if (eq.reputacao < 35) perfil.push('com reputação fragilizada');
    if (eq.equipe >= 75) perfil.push('com equipe motivada');
    else if (eq.equipe < 35) perfil.push('com equipe desgastada');
    if (eq.clientes >= 60) perfil.push('com boa base de clientes');
    else if (eq.clientes < 20) perfil.push('com poucos clientes');

    const texto = perfil.length
        ? `A empresa <strong>${esc(eq.nome)}</strong> se mostrou ${perfil.join(', ')}. `
        : `A empresa <strong>${esc(eq.nome)}</strong> manteve um equilíbrio entre os indicadores. `;

    const dica = eq.reputacao < eq.clientes
        ? 'Investir mais em reputação poderia fidelizar os clientes conquistados.'
        : eq.equipe < 40
        ? 'A equipe precisa de atenção — colaboradores desmotivados afetam tudo.'
        : 'Manter o equilíbrio é a chave para a sustentabilidade no longo prazo.';

    return `<p style="color:var(--ink2);line-height:1.6;margin-bottom:12px;">${texto}${dica}</p>`;
}

function reiniciar() {
    estado.rodadaAtual = 0;
    estado.historico = [];
    estado.equipes.forEach(eq => {
        eq.caixa = 100000; eq.reputacao = 50; eq.equipe = 50; eq.clientes = 10;
    });
    mostrarTela('tela-jogo');
    iniciarRodada();
}
</script>
